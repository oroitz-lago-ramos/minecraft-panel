name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: oroitzlr/mc-frontend:latest
          build-args: |
            VITE_API_URL=https://mc-api.oroitzlagoramos.com
            VITE_WS_URL=wss://mc-api.oroitzlagoramos.com

      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: oroitzlr/mc-backend:latest

      - name: Build mc-agent
        run: |
          cd agent
          GOOS=linux GOARCH=amd64 go build -o mc-agent .

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Upload mc-agent
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "agent/mc-agent"
          target: "/home/deploy/minecraft-panel/agent/"
          strip_components: 1

      - name: SSH → deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # 1. Redeploy containers Docker
            cd ~/vps-infra
            docker compose pull
            docker compose up -d

            # 2. Restart agent avec le nouveau binaire
            sudo systemctl restart mc-agent

            # 3. Resync backend → nouveau socket
            sleep 2
            docker compose up -d --force-recreate backend

            echo "Deploy OK — agent: $(sudo systemctl is-active mc-agent)"