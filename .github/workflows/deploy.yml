name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: oroitzlr/mc-frontend:latest
          build-args: |
            VITE_API_URL=https://mc-api.oroitzlagoramos.com
            VITE_WS_URL=wss://mc-api.oroitzlagoramos.com

      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: oroitzlr/mc-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: SSH → VPS → deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          script: |
            # 1. Pull et redeploy containers Docker
            cd ~/vps-infra
            docker compose pull
            docker compose up -d

            # 2. Rebuild mc-agent
            cd ~/minecraft-panel/agent
            git pull origin main
            go build -o /home/deploy/minecraft-panel/agent/mc-agent .
            sudo systemctl restart mc-agent

            # 3. Resync backend avec le nouveau socket
            sleep 2
            cd ~/vps-infra
            docker compose up -d --force-recreate backend

            echo "Deploy OK — agent: $(sudo systemctl is-active mc-agent)"