name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: oroitzlr/mc-frontend:latest
          build-args: |
            VITE_API_URL=https://mc-api.oroitzlagoramos.com
            VITE_WS_URL=wss://mc-api.oroitzlagoramos.com

      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: oroitzlr/mc-backend:latest

      - name: Build mc-agent
        run: |
          cd agent
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o mc-agent .

      - name: Upload mc-agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc-agent
          path: agent/mc-agent

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Download mc-agent artifact
        uses: actions/download-artifact@v4
        with:
          name: mc-agent
          path: ./

      - name: Encode agent binary
        run: echo "AGENT_B64=$(base64 -w 0 ./mc-agent)" >> $GITHUB_ENV

      - name: SSH → deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: AGENT_B64
          script: |
            echo "$AGENT_B64" | base64 -d > /home/deploy/minecraft-panel/agent/mc-agent
            chmod +x /home/deploy/minecraft-panel/agent/mc-agent

            cd ~/vps-infra
            docker compose up -d

            sudo systemctl restart mc-agent
            sleep 2
            docker compose up -d --force-recreate backend

            echo "Deploy OK — agent: $(sudo systemctl is-active mc-agent)"
        env:
          AGENT_B64: ${{ env.AGENT_B64 }}